<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>슈마커 플러스</title>

  <link rel="stylesheet" href="../../assets/css/style.css">
  <!-- Library -->
  <link rel="stylesheet" href="../../assets/css/swiper-bundle.min.css">
</head>
<body>
  <div id="wrap">

    <!-- Header -->
    <header id="header" class="header"></header>

    <!-- Content -->
    <main class="container page-login">
      <!-- 하단 고정 버튼이 있을 경우 section--fixed 추가 -->
      <section class="section section--fixed">
        <div class="section__inner">
          <!-- 타이틀 -->
          <div class="section__header">
            <button type="button" class="btn-icon btn-icon--back" aria-label="뒤로가기">
              <span class="btn-icon__icon"></span>
            </button>
            <h2 class="section__title">비밀번호 재 설정</h2>
          </div>
          <div class="login-find">
            <div class="login-find__inner">
              <div class="login-find__intro">
                <p class="login-find__desc">
                  사용하실 새로운 비밀번호를 입력해 주세요!
                </p>
              </div>
              <div class="login-find__form">
                <!-- 비밀번호 -->
                <div class="form__field is-required">
                  <label for="input1" class="form__label">새로운 비밀번호 입력</label>
                  <input type="password" id="input1" class="form__input"/>
                  <p class="form__desc">
                    새롭게 사용하실 비밀번호를 입력해 주세요!
                  </p>
                  <p class="form__desc">
                    <em>영문 대</em> + 소문자,숫자,특수문자 2개이상 조합​ <br />동일한 숫자/영문 4자리 이상은 사용불가 함​
                  </p>
                </div>

                <!-- 비밀번호 확인 -->
                <!-- is-success, is-error 성공,에러 class -->
                <div class="form__field is-required is-error">
                  <label for="input2" class="form__label">새로운 비밀번호 확인</label>
                  <input type="password" id="input2" class="form__input" placeholder="한 번 더 비밀번호를 입력해 주세요!"/>
                  <p class="form__message">동일한 비밀번호를 입력해 주세요.</p>
                  <!-- <p class="form__message">비밀번호 일치</p> -->
                </div>
              </div>
              <!-- 버튼 -->
              <div class="cta cta--fixed">
                <button type="button" class="btn btn--primary">비밀번호 변경 완료하기</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer id="footer" class="footer"></footer>
  </div>

  <!-- Scripts  -->
  <script src="../../assets/js/jquery-3.7.1.min.js"></script>
  <script src="../../assets/js/swiper-bundle.min.js"></script>
  <script src="../../assets/js/ui.js"></script>
  <!-- Script for loading header and footer (퍼블용) -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      ["header", "footer"].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const file = el.dataset.file || `${id}.html`;
        fetch(`../include/${file}`)
          .then(res => res.text())
          .then(html => (el.innerHTML = html));
      });
    });
  </script>
</body>
</html>
