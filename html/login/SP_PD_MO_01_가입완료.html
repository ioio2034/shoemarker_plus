<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>슈마커 플러스</title>

  <link rel="stylesheet" href="../../assets/css/style.css">
  <!-- Library -->
  <link rel="stylesheet" href="../../assets/css/swiper-bundle.min.css">
</head>
<body>
  <div id="wrap" class="page-join">

    <!-- Header -->
    <header id="header" class="header"></header>

    <!-- Content -->
    <main class="container">
      <section class="section section--fixed">
        <div class="section__inner">
          <!-- result -->
          <div class="result result--center">
            <div class="result__inner">              
              <div class="result__content">
                <img class="result__logo" src="../../assets/images/logo.svg" alt="SHOEMARKER +">
                <div class="result__header">
                  <h2 class="result__title result__title--lg">당신을 환영합니다!</h2>
                  <p class="result__text">
                    <span class="result__name">홍길동</span> 님, 어서오세요. <br />
                    회원가입을 축하 드립니다.
                  </p>
                </div>
                <div class="result__box">
                  <ul class="list">
                    <li>
                      회원가입일 : <span class="result__value">2026.05.05</span>
                    </li>
                    <li>
                      가입경로 : 
                      <span class="result__value">슈마커 플러스 일반회원 가입</span>
                      <!-- <span class="result__value">카카오톡 간편 가입</span> -->
                      <!-- <span class="result__value">네이버 간편 가입</span> -->
                    </li>
                  </ul>
                </div>
              </div>
    
              <!-- 버튼 -->
              <div class="cta cta--fixed">
                <button type="button" class="btn btn--primary">서비스 시작하기</button>
              </div>
  
            </div>
          </div>
        </div>
      </section> 
    </main>

    <!-- Footer -->
    <footer id="footer" class="footer"></footer>
  </div>

  <!-- Scripts  -->
  <script src="../../assets/js/jquery-3.7.1.min.js"></script>
  <script src="../../assets/js/swiper-bundle.min.js"></script>
  <script src="../../assets/js/ui.js"></script>
  <!-- Script for loading header and footer (퍼블용) -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      ["header", "footer"].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const file = el.dataset.file || `${id}.html`;
        fetch(`../include/${file}`)
          .then(res => res.text())
          .then(html => (el.innerHTML = html));
      });
    });
  </script>
</body>
</html>
