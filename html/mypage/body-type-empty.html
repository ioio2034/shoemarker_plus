<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>슈마커 플러스</title>

  <link rel="stylesheet" href="../../assets/css/style.css">
  <!-- Library -->
  <link rel="stylesheet" href="../../assets/css/swiper-bundle.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
  <div id="wrap" class="page-mypage">

    <!-- Header -->
    <header id="header" class="header"></header>

    <!-- Content -->
    <!-- lnb 있을 경우 has-lnb 추가 -->
    <main class="container has-lnb">

      <!-- lnb -->
      <aside id="lnb" class="lnb"></aside>

      <!-- 하단 고정 버튼이 있을 경우 section--fixed 추가 -->
      <section class="section section--fixed">
        <div class="section__inner">
          <!-- 타이틀 -->
          <div class="section__header">
            <button type="button" class="btn-icon btn-icon--back" aria-label="뒤로가기">
              <span class="btn-icon__icon"></span>
            </button>
            <h2 class="section__title">나의 체형</h2>
          </div>

          <div class="body-type">
            <div class="intro">
              <h3 class="intro__name">홍길동</h3>
              <p class="intro__text">사이즈를 입력하시면 고객님의 체형을 기반으로 다양한 정보를 제공해 드릴게요!</p>
            </div>

            <div class="divider"></div>

            <!-- 등록된 정보가 없을 경우 is-empty 클래스 추가 -->
            <div class="body-type__content is-empty">
              <!-- 등록된 정보가 없을 경우 -->
              <div class="empty">
                <div class="empty__content">
                  <span class="empty__icon empty__icon--message"></span>
                  <p class="empty__text">등록된 체형 정보가 없습니다!</p>
                </div>
              </div>
  
              <div class="coupon-group">
                <div class="coupon">
                  <div class="coupon__label">COUPON</div>
                  <div class="coupon__content">
                    <strong class="coupon__rate">15%</strong>
                    <p class="coupon__text">
                      체형관리 정보를 등록하시면 <br />15% 할인 쿠폰이 자동 발급됩니다.
                    </p>
                  </div>
                </div>
                <div class="btn-wrap btn-wrap--fixed">
                  <button type="button" class="btn btn--primary">체형 등록하기</button>
                </div>
              </div>
            </div>


          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer id="footer" class="footer"></footer>

  </div>

  <!-- Scripts  -->
  <script src="../../assets/js/jquery-3.7.1.min.js"></script>
  <script src="../../assets/js/swiper-bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
  <script src="../../assets/js/ui.js"></script>
  <!-- Script for loading header and footer (퍼블용) -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      ["header", "lnb", "footer"].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const file = el.dataset.file || `${id}.html`;
        fetch(`../include/${file}`)
          .then(res => res.text())
          .then(html => (el.innerHTML = html));
      });
    });
  </script>
</body>
</html>
