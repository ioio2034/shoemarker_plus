<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>슈마커 플러스</title>

  <link rel="stylesheet" href="../../assets/css/style.css">
  <!-- Library -->
  <link rel="stylesheet" href="../../assets/css/swiper-bundle.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
  <div id="wrap">

    <!-- Header -->
    <header id="header" class="header"></header>

    <!-- Content -->
    <!-- lnb 있을 경우 has-lnb 추가 -->
    <main class="container page-mypage has-lnb">
      
      <!-- lnb -->
      <aside id="lnb" class="lnb"></aside>
      
      <section class="section">
        <div class="section__inner">
          <!-- 타이틀 -->
          <div class="section__header">
            <button type="button" class="btn-icon btn-icon--back" aria-label="뒤로가기">
              <span class="btn-icon__icon"></span>
            </button>
            <h2 class="section__title">주문취소</h2>
          </div>

          <div class="order-done">
            
            <div class="claim-done">
              <div class="claim-done__inner">
                <div class="claim-done__top">
                  <div class="claim-done__img">
                    <img src="../../assets/images/icon_success_w.svg" alt="">
                  </div>
                  <h3 class="claim-done__title">
                    주문 취소 요청이 정상적으로 <br class="is-mo" />접수되었습니다.
                  </h3>
                </div>                
                <div class="claim-done__box">
                  <ul class="claim-done__list">
                    <li>이미 상품이 출고되었거나 배송 준비 중인 경우 취소가 제한될 수 있습니다.</li>
                    <li>이 경우 상품 수령 후 반품으로 처리될 수 있습니다.</li>
                  </ul>
                </div>
                <p class="claim-done__text">
                  주문 취소 진행 여부는 
                  <a href="#" class="claim-done__link">마이페이지 > 주문 취소/환불 내역</a>
                  에서 확인하실 수 있습니다.
                </p>
              </div>
            </div>
          
            <div class="divider"></div>
            
            <div class="claim-notice">
              <div class="content__inner">
                <div class="btn-wrap">
                  <button type="button" class="btn btn--line btn--secondary btn--lg">주문 취소 및 교환/환불 바로가기</button>
                  <button type="button" class="btn btn--primary btn--lg">쇼핑 계속하기</button>
                </div>
                <p class="text-notice">※ 환불은 결제 수단에 따라 처리 기간이 상이합니다.</p>
                <ul class="list list--dot">
                  <li>카드 결제: 카드사 승인 취소까지 3~7일 소요</li>
                  <li>계좌 이체: 영업일 기준 1~3일 내 환불</li>
                  <li>간편결제: 각 결제 사 정책에 따름</li>
                </ul>
              </div>              
            </div>

          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer id="footer" class="footer"></footer>

  </div>

  <!-- Scripts  -->
  <script src="../../assets/js/jquery-3.7.1.min.js"></script>
  <script src="../../assets/js/swiper-bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
  <script src="../../assets/js/ui.js"></script>
  <!-- Script for loading header and footer (퍼블용) -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      ["header", "lnb", "footer"].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const file = el.dataset.file || `${id}.html`;
        fetch(`../include/${file}`)
          .then(res => res.text())
          .then(html => (el.innerHTML = html));
      });
    });
  </script>
</body>
</html>
